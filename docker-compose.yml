services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: prodyo-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - duckdb-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: prodyo-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  duckdb-data:
